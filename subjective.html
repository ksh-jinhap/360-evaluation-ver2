<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>상사평가 주관식 확인 및 제출</title>
<style>
:root{--nv:#1a3a5c;--nv2:#2563a8;--bd:#d0d7e3;--bg:#f4f6fb;--tx:#1a2a3a;--tx2:#3a5a7a;--tx3:#7a90a8;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a3a5c 0%,#2563a8 100%)}
.login-box{background:#fff;border-radius:20px;padding:44px 38px 36px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(26,58,92,.18)}
.login-logo{font-size:48px;text-align:center;margin-bottom:16px}
.login-title{text-align:center;font-size:22px;font-weight:800;color:var(--nv);margin-bottom:6px}
.login-sub{text-align:center;font-size:14px;color:var(--tx3);margin-bottom:28px;line-height:1.7}
.lfield{margin-bottom:14px}
.lfield label{display:block;font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:5px}
.lfield input{width:100%;padding:11px 14px;border:1.5px solid var(--bd);border-radius:8px;font-size:15px;font-family:inherit;outline:none;transition:.15s}
.lfield input:focus{border-color:var(--nv2);box-shadow:0 0 0 3px rgba(37,99,168,.1)}
.btn-primary{width:100%;padding:13px;background:var(--nv2);color:#fff;border:none;border-radius:9px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px;transition:.15s}
.btn-primary:hover{background:#1a3a5c}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.err{color:#c62828;font-size:14px;text-align:center;margin-top:10px;min-height:20px}

/* 결과화면 */
.topbar{background:var(--nv);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-l{font-size:17px;font-weight:700}
.btn-out{background:#fff2;border:none;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit}
.inner{max-width:860px;margin:0 auto;padding:28px 16px 120px}
.page-title{font-size:20px;font-weight:800;color:var(--nv);margin-bottom:6px}
.page-sub{font-size:14px;color:var(--tx3);margin-bottom:24px;line-height:1.7}

.card{background:#fff;border-radius:var(--r);box-shadow:0 2px 12px rgba(26,58,92,.07);padding:24px;margin-bottom:16px}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1.5px solid var(--bd);flex-wrap:wrap}
.card-title{font-size:16px;font-weight:700;color:var(--nv)}
.badge{font-size:13px;padding:3px 10px;border-radius:12px;background:#e8f0fc;color:var(--nv2);font-weight:600}
.notice-badge{font-size:12px;padding:3px 8px;border-radius:8px;background:#fff3e0;color:#e64a19;font-weight:600}

.ta-group{margin-bottom:16px}
.ta-group-title{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ta-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.ta-wrap{display:flex;flex-direction:column;gap:4px}
.ta-wrap label{font-size:12px;color:var(--tx3)}
.ta-wrap textarea{width:100%;padding:9px 11px;border:1.5px solid var(--bd);border-radius:7px;font-size:14px;font-family:inherit;resize:vertical;outline:none;transition:.15s;min-height:80px;line-height:1.5}
.ta-wrap textarea:focus{border-color:var(--nv2);box-shadow:0 0 0 3px rgba(37,99,168,.1)}
.adv-color{color:#2e7d52}
.imp-color{color:#e64a19}

.no-data{text-align:center;padding:60px 20px;color:var(--tx3)}
.no-data .ico{font-size:48px;margin-bottom:12px}

/* 하단 제출 버튼 */
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--bd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:200;box-shadow:0 -4px 16px rgba(26,58,92,.1)}
.submit-info{font-size:14px;color:var(--tx3);line-height:1.5}
.submit-info b{color:var(--nv);font-size:15px}
.btn-submit{padding:12px 28px;background:#2e7d52;color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:.15s}
.btn-submit:hover:not(:disabled){background:#1b5e38}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}

.done-wrap{text-align:center;padding:80px 20px}
.done-wrap .ico{font-size:64px;margin-bottom:16px}
.done-wrap h2{font-size:22px;font-weight:800;color:#2e7d52;margin-bottom:8px}
.done-wrap p{font-size:15px;color:var(--tx3);line-height:1.7}

@media(max-width:600px){
  .ta-grid{grid-template-columns:1fr}
  .submit-bar{flex-direction:column;align-items:stretch}
  .btn-submit{text-align:center}
}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="pg-login" class="login-bg">
  <div class="login-box">
    <div class="login-logo">✍️</div>
    <div class="login-title">주관식 작성</div>
    <div class="login-sub">
      본인들의 상사평가에서 작성한 내용을<br>작성해주시기 바랍니다.
    </div>
    <div class="lfield">
      <label>이름</label>
      <input type="text" id="li-name" placeholder="이름을 입력하세요" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="lfield">
      <label>사번</label>
      <input type="text" id="li-emp" placeholder="숫자 6자리" maxlength="6" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="lfield">
      <label>휴대폰 뒷자리</label>
      <input type="password" id="li-phone4" placeholder="숫자 4자리" maxlength="4" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">내용 확인하기</button>
    <div class="err" id="li-err"></div>
  </div>
</div>

<!-- 결과 화면 -->
<div id="pg-result" style="display:none">
  <div class="topbar">
    <div class="topbar-l">✍️ 상사평가 주관식 확인 및 제출</div>
    <div style="display:flex;align-items:center;gap:12px;font-size:14px">
      <span id="top-name"></span>
      <button class="btn-out" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="inner">
    <div class="page-title" id="res-title"></div>
    <div class="page-sub">
      본인들의 상사평가에서 작성한 내용을 작성해주시기 바랍니다.<br>
      내용 입력 후 하단의 <b>최종 제출</b> 버튼을 눌러주세요.
    </div>
    <div id="subj-cards"></div>
  </div>
  <div class="submit-bar" id="submit-bar" style="display:none">
    <div class="submit-info">
      총 <b id="subj-count">0</b>명에 대한 주관식 내용<br>
      <span style="font-size:12px;color:#e64a19">제출 후 수정이 불가합니다.</span>
    </div>
    <button class="btn-submit" id="btn-submit" onclick="doSubmit()">📨 주관식 내용 최종 제출</button>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwZBmAvUbLRiCi_CqzL0mgSiUc0UsbSQ2kh5HVRLlw3wOZix8eo22kckKiNDhRxZIZbpg/exec";

const FORM_LABEL = {
  super_mgr: '상사평가 (상사용)',
  super_ceo: '상사평가 (법인대표용)'
};

let CU = null;
let SUBJ_ITEMS = []; // [{type, person, cardIdx}]

function hp(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return String(h)}
function digits(s){return String(s||'').replace(/\D/g,'')}
function authKey(e,p){return hp(digits(e).padStart(6,'0')+'|'+digits(p).padStart(4,'0'))}

// ── 로그인 ──
function doLogin(){
  const name   = document.getElementById('li-name').value.trim();
  const empNo  = digits(document.getElementById('li-emp').value);
  const phone4 = digits(document.getElementById('li-phone4').value);
  const errEl  = document.getElementById('li-err');

  if(!name||empNo.length!==6||phone4.length!==4){
    errEl.textContent='이름, 사번 6자리, 휴대폰 뒷자리 4자리를 모두 입력해주세요.';
    return;
  }

  const users = JSON.parse(localStorage.getItem('ev26_users')||'[]');
  const key   = authKey(empNo, phone4);
  const u     = users.find(u => u.name===name && u.auth===key);

  if(!u){ errEl.textContent='로그인 정보가 일치하지 않습니다.'; return; }

  CU = u;
  errEl.textContent='';
  showResult();
}

function doLogout(){
  CU=null; SUBJ_ITEMS=[];
  document.getElementById('pg-login').style.display='flex';
  document.getElementById('pg-result').style.display='none';
  ['li-name','li-emp','li-phone4'].forEach(id=>{document.getElementById(id).value='';});
}

// ── 결과 화면 ──
function showResult(){
  document.getElementById('pg-login').style.display='none';
  document.getElementById('pg-result').style.display='block';
  document.getElementById('top-name').textContent = CU.name+'님';
  document.getElementById('res-title').textContent = CU.name+'님의 상사평가 주관식 내용';

  // localStorage에서 상사평가 제출 데이터 수집
  const subs = JSON.parse(localStorage.getItem('ev26_submissions')||'[]');
  const superSubs = subs.filter(s =>
    s.uid===CU.id && (s.type==='super_mgr'||s.type==='super_ceo')
  );

  SUBJ_ITEMS = [];
  const cards = document.getElementById('subj-cards');

  if(superSubs.length===0){
    cards.innerHTML=`<div class="no-data"><div class="ico">📭</div><p>상사평가 제출 내역이 없습니다.<br><span style="font-size:13px;color:#e64a19">※ 평가를 제출한 브라우저에서 접속해야 합니다.</span></p></div>`;
    return;
  }

  let html='';
  let cardIdx=0;

  superSubs.forEach(sub=>{
    const scores = sub.scores||{};
    Object.entries(scores).forEach(([person, items])=>{
      const adv1=items['__adv1']||'';
      const adv2=items['__adv2']||'';
      const adv3=items['__adv3']||'';
      const imp1=items['__imp1']||'';
      const imp2=items['__imp2']||'';
      const imp3=items['__imp3']||'';
      const hasAny=adv1||adv2||adv3||imp1||imp2||imp3;
      const ci=cardIdx;

      SUBJ_ITEMS.push({type:sub.type, person, cardIdx:ci, subId:sub.id});

      html+=`
      <div class="card">
        <div class="card-header">
          <div class="card-title">피평가자: <b>${person}</b></div>
          <div class="badge">${FORM_LABEL[sub.type]||sub.type}</div>
          ${!hasAny?'<div class="notice-badge">⚠️ 기존 주관식 미작성 — 지금 입력해주세요</div>':''}
        </div>

        <div class="ta-group">
          <div class="ta-group-title adv-color">💚 리더로서의 장점</div>
          <div class="ta-grid">
            <div class="ta-wrap">
              <label>① 첫 번째</label>
              <textarea id="adv1_${ci}" placeholder="장점 1">${adv1}</textarea>
            </div>
            <div class="ta-wrap">
              <label>② 두 번째</label>
              <textarea id="adv2_${ci}" placeholder="장점 2">${adv2}</textarea>
            </div>
            <div class="ta-wrap">
              <label>③ 세 번째</label>
              <textarea id="adv3_${ci}" placeholder="장점 3">${adv3}</textarea>
            </div>
          </div>
        </div>

        <div class="ta-group">
          <div class="ta-group-title imp-color">🔶 리더로서의 보완점</div>
          <div class="ta-grid">
            <div class="ta-wrap">
              <label>① 첫 번째</label>
              <textarea id="imp1_${ci}" placeholder="보완점 1">${imp1}</textarea>
            </div>
            <div class="ta-wrap">
              <label>② 두 번째</label>
              <textarea id="imp2_${ci}" placeholder="보완점 2">${imp2}</textarea>
            </div>
            <div class="ta-wrap">
              <label>③ 세 번째</label>
              <textarea id="imp3_${ci}" placeholder="보완점 3">${imp3}</textarea>
            </div>
          </div>
        </div>
      </div>`;
      cardIdx++;
    });
  });

  cards.innerHTML=html;
  document.getElementById('subj-count').textContent=SUBJ_ITEMS.length;
  document.getElementById('submit-bar').style.display='flex';
}

// ── 최종 제출 ──
async function doSubmit(){
  if(!confirm('주관식 내용을 최종 확정 및 제출하시겠습니까?\n\n제출 후에는 수정이 불가합니다.')) return;

  // 현재 입력값 수집
  const dataToSend = SUBJ_ITEMS.map(item=>{
    const ci=item.cardIdx;
    return {
      evalName: CU.name,
      evalTeam: CU.team||'',
      person:   item.person,
      evalType: item.type,
      adv1: document.getElementById(`adv1_${ci}`)?.value||'',
      adv2: document.getElementById(`adv2_${ci}`)?.value||'',
      adv3: document.getElementById(`adv3_${ci}`)?.value||'',
      imp1: document.getElementById(`imp1_${ci}`)?.value||'',
      imp2: document.getElementById(`imp2_${ci}`)?.value||'',
      imp3: document.getElementById(`imp3_${ci}`)?.value||'',
    };
  });

  const btn=document.getElementById('btn-submit');
  btn.disabled=true; btn.textContent='⏳ 제출 중...';

  try {
    const form=new FormData();
    form.append('action','saveSubjective');
    form.append('dataJson',JSON.stringify(dataToSend));
    await fetch(GAS_URL,{method:'POST',body:form,mode:'no-cors'});

    document.getElementById('subj-cards').innerHTML=`
      <div class="done-wrap">
        <div class="ico">✅</div>
        <h2>제출 완료!</h2>
        <p>주관식 내용이 성공적으로 제출되었습니다.<br>감사합니다.</p>
      </div>`;
    document.getElementById('submit-bar').style.display='none';
  } catch(e){
    alert('제출 중 오류가 발생했습니다. 다시 시도해주세요.');
    btn.disabled=false; btn.textContent='📨 주관식 내용 최종 제출';
  }
}

// 우클릭/F12 차단
(function(){
  document.addEventListener('contextmenu',e=>{e.preventDefault();return false;});
  document.addEventListener('keydown',e=>{
    if(e.key==='F12'){e.preventDefault();return false;}
    if(e.ctrlKey&&e.key.toLowerCase()==='u'){e.preventDefault();return false;}
    if(e.ctrlKey&&e.shiftKey&&['i','j','c'].includes(e.key.toLowerCase())){e.preventDefault();return false;}
  });
})();
</script>
</body>
</html>
